
<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港定期存款利率比較 | HK Deposit Rates</title>
<style>
:root {
  --bg: #f3f4f6;
  --bg-card: #ffffff;
  --border: #e2e8f0;
  --border-light: #cbd5e1;
  --text: #0f172a;
  --text-secondary: #475569;
  --text-muted: #64748b;
  --accent: #4338ca;
  --accent-light: #4f46e5;
  --green: #059669;
  --orange: #d97706;
  --purple: #7c3aed;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 18px rgba(15,23,42,0.03);
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Noto Sans SC', 'Noto Sans HK', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

.header {
  background: rgba(255,255,255,0.85);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.header-inner {
  max-width: 1400px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 12px rgba(67,56,202,0.08);
}
.logo-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
.logo-text span { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.2);
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--green);
}
.live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; }
.update-time { font-size: 12px; color: var(--text-muted); }

.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; position: relative; overflow: hidden; transition: var(--transition); box-shadow: var(--shadow);
}
.stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15,23,42,0.05); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--green), var(--accent)); }
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent), var(--purple)); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--orange), #b45309); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--purple), var(--accent)); }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.stat-value .unit { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.filter-section { margin-bottom: 24px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
.filter-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); min-width: 60px; }
.filter-group { display: flex; gap: 4px; background: #f1f5f9; border-radius: var(--radius-sm); padding: 3px; border: 1px solid var(--border); }
.filter-btn {
  padding: 8px 16px; border: none; border-radius: 6px; background: transparent;
  color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: var(--transition); white-space: nowrap;
}
.filter-btn:hover { color: var(--text); background: rgba(15,23,42,0.05); }
.filter-btn.active { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(67,56,202,0.2); }
.filter-btn.active.green { background: var(--green); box-shadow: 0 2px 8px rgba(5,150,105,0.25); }
.filter-btn.active.orange { background: var(--orange); color: white; box-shadow: 0 2px 8px rgba(217,119,6,0.25); }
.filter-btn.active.purple { background: var(--purple); box-shadow: 0 2px 8px rgba(124,58,237,0.25); }
.search-box {
  display: flex; align-items: center; gap: 8px; background: #ffffff; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 14px; flex: 1; min-width: 200px; max-width: 320px; transition: var(--transition);
}
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(67,56,202,0.08); }
.search-box svg { color: var(--text-muted); flex-shrink: 0; }
.search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 14px; width: 100%; }
.search-box input::placeholder { color: var(--text-muted); }

.table-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.table-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.table-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.bank-count { background: rgba(67,56,202,0.08); color: var(--accent-light); font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 12px; }
.sort-hint { font-size: 12px; color: var(--text-muted); }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
thead th {
  padding: 14px 16px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  text-align: left; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0;
  cursor: pointer; user-select: none; transition: var(--transition); white-space: nowrap;
}
thead th:hover { color: var(--text-secondary); background: var(--bg); }
thead th.sorted { color: var(--accent-light); }
thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
tbody tr { border-bottom: 1px solid var(--border); transition: var(--transition); }
tbody tr:hover { background: var(--bg); }
tbody tr.best-rate { background: rgba(5,150,105,0.03); }
tbody tr.best-rate:hover { background: rgba(5,150,105,0.06); }
tbody td { padding: 14px 16px; font-size: 14px; white-space: nowrap; vertical-align: middle; }
.bank-cell { display: flex; align-items: center; gap: 12px; min-width: 250px; }
.bank-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; color: white; letter-spacing: 0.5px; }
.bank-info { display: flex; flex-direction: column; gap: 3px; }
.bank-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.bank-name { font-weight: 700; font-size: 14px; color: var(--text); }
.bank-eng { font-size: 11px; font-weight: 600; color: var(--text-muted); }
.bank-type { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; display: inline-block; white-space: nowrap; }
.bank-type.traditional { background: rgba(67,56,202,0.06); color: var(--accent-light); }
.bank-type.virtual { background: rgba(14,165,233,0.08); color: #0284c7; }
.rate-cell { font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }
.rate-cell.best { color: var(--green); position: relative; }
.rate-cell.best::after { content: '👑'; font-size: 10px; margin-left: 4px; vertical-align: super; }
.rate-cell.good { color: var(--accent-light); }
.rate-cell.low { color: var(--text-muted); }
.period-cell { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.min-deposit { font-size: 13px; color: var(--text-secondary); }
.min-deposit .no-min { color: var(--green); font-weight: 500; }
.note-cell { font-size: 12px; color: var(--text-muted); max-width: 220px; white-space: normal; line-height: 1.5; }

.calc-section { margin-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.calc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.calc-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.calc-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group select, .form-group input { padding: 10px 14px; background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; transition: var(--transition); }
.form-group select:focus, .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(67,56,202,0.08); }
.form-group select { cursor: pointer; }
.calc-btn { padding: 12px; background: linear-gradient(135deg, var(--accent), var(--purple)); border: none; border-radius: var(--radius-sm); color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 8px; }
.calc-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(67,56,202,0.25); }
.calc-result { margin-top: 20px; padding: 20px; background: rgba(5,150,105,0.04); border: 1px solid rgba(5,150,105,0.15); border-radius: var(--radius-sm); display: none; }
.calc-result.show { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.result-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.result-row + .result-row { border-top: 1px solid rgba(5,150,105,0.08); }
.result-label { font-size: 13px; color: var(--text-secondary); }
.result-value { font-size: 15px; font-weight: 700; }
.result-value.highlight { color: var(--green); font-size: 22px; }

.chart-wrapper { width: 100%; height: 260px; position: relative; overflow: hidden; border-radius: var(--radius-sm); background: #f1f5f9; }

.footer { max-width: 1400px; margin: 40px auto 0; padding: 24px; border-top: 1px solid var(--border); text-align: center; }
.footer p { font-size: 12px; color: var(--text-muted); line-height: 1.8; }

.best-banner { background: linear-gradient(135deg, rgba(5,150,105,0.04), rgba(67,56,202,0.04)); border: 1px solid rgba(5,150,105,0.12); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.best-banner-left h3 { font-size: 16px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
.best-banner-left p { font-size: 13px; color: var(--text-secondary); }
.best-banner-right { display: flex; gap: 24px; align-items: center; }
.best-rate-item { text-align: center; }
.best-rate-item .period { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.best-rate-item .rate { font-size: 22px; font-weight: 800; color: var(--green); }
.best-rate-item .bank { font-size: 11px; color: var(--text-secondary); }

@media (max-width: 768px) {
  .header-inner { padding: 12px 16px; flex-direction: column; align-items: flex-start; gap: 8px; }
  .header-right { width: 100%; justify-content: space-between; }
  .main { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 14px; }
  .stat-value { font-size: 22px; }
  .filter-row { gap: 8px; flex-direction: column; align-items: flex-start; }
  .filter-row > div { width: 100%; }
  .filter-btn { padding: 6px 12px; font-size: 12px; }
  .search-box { max-width: none; min-width: auto; width: 100%; }
  .calc-section { grid-template-columns: 1fr; }
  .calc-form { grid-template-columns: 1fr; }
  .logo-text h1 { font-size: 15px; }
  .update-time { display: none; }
  .table-header-bar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .note-cell { max-width: 150px; }
}
.no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.no-results svg { margin-bottom: 12px; opacity: 0.3; }
.no-results p { font-size: 15px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">💰</div>
      <div class="logo-text">
        <h1>HK Deposit Rates</h1>
        <span>香港定期存款利率比較平台</span>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="statusText">官方基準數據</span>
      </div>
      <span class="update-time" id="updateTime"></span>
    </div>
  </div>
</header>

<main class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label" id="lblBestRate">最高利率</div>
      <div class="stat-value" id="statBestRate">—</div>
      <div class="stat-sub" id="statBestBank">讀取中...</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">比較銀行數目</div>
      <div class="stat-value" id="statBankCount">—</div>
      <div class="stat-sub">傳統 + 數字銀行</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均最高利率</div>
      <div class="stat-value" id="statAvgRate">—</div>
      <div class="stat-sub">所有銀行平均</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">數據更新</div>
      <div class="stat-value" id="statUpdateStatus">—</div>
      <div class="stat-sub" id="statUpdateSub">點擊表格編輯圖標可更新</div>
    </div>
  </div>

  <div class="best-banner" id="bestBanner">
    <div class="best-banner-left">
      <h3>🏆 今日最高息推介</h3>
      <p id="bannerSubtext">讀取中...</p>
    </div>
    <div class="best-banner-right" id="bannerRates"></div>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">貨幣</span>
      <div class="filter-group" id="currencyFilter">
        <button class="filter-btn active green" data-value="HKD">🇭🇰 港元 HKD</button>
        <button class="filter-btn" data-value="USD">🇺🇸 美元 USD</button>
        <button class="filter-btn" data-value="RMB">🇨🇳 人民幣 RMB</button>
      </div>
    </div>
    <div class="filter-row" style="justify-content: space-between;">
      <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
        <span class="filter-label">銀行類型</span>
        <div class="filter-group" id="typeFilter">
          <button class="filter-btn active" data-value="all">全部</button>
          <button class="filter-btn" data-value="traditional">🏦 傳統銀行</button>
          <button class="filter-btn" data-value="virtual">📱 數字銀行</button>
        </div>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋銀行名稱...">
        </div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-header-bar">
      <div class="table-title">利率比較表 <span class="bank-count" id="bankCountBadge">讀取中...</span></div>
      <div class="sort-hint">點擊欄位標題排序</div>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="tableHead"><tr><th colspan="5" class="loading">⏳ 讀取中...</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="calc-section">
    <div class="calc-card">
      <div class="calc-title">🧮 利息計算機</div>
      <div class="calc-form">
        <div class="form-group">
          <label>存款貨幣</label>
          <select id="calcCurrency">
            <option value="HKD">港元 HKD</option>
            <option value="USD">美元 USD</option>
            <option value="RMB">人民幣 RMB</option>
          </select>
        </div>
        <div class="form-group">
          <label>存款期</label>
          <select id="calcPeriod">
            <option value="1">1 個月</option>
            <option value="3" selected>3 個月</option>
            <option value="6">6 個月</option>
            <option value="12">12 個月</option>
          </select>
        </div>
        <div class="form-group">
          <label>存款金額</label>
          <input type="number" id="calcAmount" value="100000" min="1" placeholder="輸入金額">
        </div>
        <div class="form-group">
          <label>年利率 (%)</label>
          <input type="number" id="calcRate" value="2.65" step="0.01" min="0" placeholder="輸入利率">
        </div>
        <div class="form-group full">
          <button class="calc-btn" id="calcBtn">計算利息收益</button>
        </div>
      </div>
      <div class="calc-result" id="calcResult">
        <div class="result-row"><span class="result-label">存款金額</span><span class="result-value" id="resPrincipal"></span></div>
        <div class="result-row"><span class="result-label">存款期</span><span class="result-value" id="resPeriod"></span></div>
        <div class="result-row"><span class="result-label">年利率</span><span class="result-value" id="resRate"></span></div>
        <div class="result-row"><span class="result-label">到期利息</span><span class="result-value highlight" id="resInterest"></span></div>
        <div class="result-row"><span class="result-label">到期本息合計</span><span class="result-value" id="resTotal"></span></div>
      </div>
    </div>
    <div class="calc-card">
      <div class="calc-title">📊 銀行最高利率比較</div>
      <div class="chart-wrapper"><canvas id="rateChart"></canvas></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p>⚠️ 利率資料僅供參考，實際利率以各銀行官方公布為準。</p>
  <p>數據更新：<span id="footerTime"></span></p>
  <p style="margin-top:8px;">© 2026 HK Deposit Rates</p>
</footer>

<script>

function setupCalc(){

    const currency=document.getElementById('calcCurrency').value, period=parseInt(document.getElementById('calcPeriod').value),
          amount=parseFloat(document.getElementById('calcAmount').value), rate=parseFloat(document.getElementById('calcRate').value);

    if(!rate||rate<0){ showToast('⚠️ 請輸入有效嘅年利率'); return; }
    const interest=amount*(rate/100)*(period/12), total=amount+interest, sym=getSym(currency);
    document.getElementById('resPrincipal').textContent=sym+amount.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById('resInterest').textContent=sym+interest.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

function drawChart(){

  const W=rect.width, H=rect.height, pad={top:20,right:20,bottom:80,left:50};
  ctx.clearRect(0,0,W,H);
  const data=(allData[state.currency]||[]).sort((a,b)=>b.bestRate-a.bestRate).slice(0,12);
  if(data.length===0) return;
  const maxRate=Math.max(...data.map(d=>d.bestRate))*1.1;
  const chartW=W-pad.left-pad.right, chartH=H-pad.top-pad.bottom;
  const barWidth=Math.min((chartW/data.length)*0.6,40);
  const gap=(chartW-barWidth*data.length)/(data.length+1);
  ctx.strokeStyle='rgba(15,23,42,0.06)'; ctx.lineWidth=1;
  for(let i=0;i<=5;i++){ const y=pad.top+(chartH/5)*i; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke(); const val=maxRate*(1-i/5); ctx.fillStyle='#64748b'; ctx.font='11px -apple-system, sans-serif'; ctx.textAlign='right'; ctx.fillText(val.toFixed(1)+'%',pad.left-8,y+4); }
  data.forEach((b,i)=>{
    const x=pad.left+gap+i*(barWidth+gap); const barH=(b.bestRate/maxRate)*chartH; const y=pad.top+chartH-barH;

    const grad=ctx.createLinearGradient(x,y,x,pad.top+chartH); grad.addColorStop(0,color); grad.addColorStop(1,color+'40');

  });
}
