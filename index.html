<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港定期存款利率比較</title>
<style>
:root { --bg:#f3f4f6; --bg-card:#fff; --border:#e2e8f0; --text:#0f172a; --text-secondary:#475569; --text-muted:#64748b; --accent:#4338ca; --accent-light:#4f46e5; --green:#059669; --orange:#d97706; --purple:#7c3aed; --radius:12px; --shadow:0 4px 18px rgba(15,23,42,0.03); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans HK',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.header { background:rgba(255,255,255,0.85); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
.header-inner { max-width:1400px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--purple)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.logo-text h1 { font-size:18px; font-weight:700; }
.logo-text span { font-size:11px; color:var(--text-muted); }
.live-badge { display:flex; align-items:center; gap:6px; background:rgba(5,150,105,0.08); border:1px solid rgba(5,150,105,0.2); padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; color:var(--green); }
.live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; }
.main { max-width:1400px; margin:0 auto; padding:24px; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; position:relative; overflow:hidden; box-shadow:var(--shadow); }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.stat-card:nth-child(1)::before { background:linear-gradient(90deg,var(--green),var(--accent)); }
.stat-card:nth-child(2)::before { background:linear-gradient(90deg,var(--accent),var(--purple)); }
.stat-card:nth-child(3)::before { background:linear-gradient(90deg,var(--orange),#b45309); }
.stat-card:nth-child(4)::before { background:linear-gradient(90deg,var(--purple),var(--accent)); }
.stat-label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
.stat-value { font-size:28px; font-weight:800; letter-spacing:-1px; }
.stat-value .unit { font-size:16px; font-weight:500; color:var(--text-secondary); }
.stat-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }

.filter-section { margin-bottom:24px; }
.filter-row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:12px; }
.filter-label { font-size:13px; font-weight:600; color:var(--text-secondary); min-width:60px; }
.filter-group { display:flex; gap:4px; background:#f1f5f9; border-radius:8px; padding:3px; border:1px solid var(--border); }
.filter-btn { padding:8px 16px; border:none; border-radius:6px; background:transparent; color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.filter-btn:hover { color:var(--text); background:rgba(15,23,42,0.05); }
.filter-btn.active { background:var(--accent); color:white; box-shadow:0 2px 8px rgba(67,56,202,0.2); }
.filter-btn.active.green { background:var(--green); box-shadow:0 2px 8px rgba(5,150,105,0.25); }
.filter-btn.active.orange { background:var(--orange); color:white; box-shadow:0 2px 8px rgba(217,119,6,0.25); }
.filter-btn.active.purple { background:var(--purple); box-shadow:0 2px 8px rgba(124,58,237,0.25); }
.search-box { display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:8px 14px; flex:1; min-width:200px; max-width:320px; }
.search-box input { background:none; border:none; outline:none; color:var(--text); font-size:14px; width:100%; }
.search-box input::placeholder { color:var(--text-muted); }

.table-wrapper { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.table-header-bar { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
.table-title { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
.bank-count { background:rgba(67,56,202,0.08); color:var(--accent-light); font-size:12px; font-weight:600; padding:2px 10px; border-radius:12px; }
.table-scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:700px; }
thead th { padding:14px 16px; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; text-align:left; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; cursor:pointer; white-space:nowrap; }
thead th.sorted { color:var(--accent-light); }
tbody tr { border-bottom:1px solid var(--border); transition:all 0.2s; }
tbody tr:hover { background:var(--bg); }
tbody tr.best-rate { background:rgba(5,150,105,0.03); }
tbody td { padding:14px 16px; font-size:14px; white-space:nowrap; vertical-align:middle; }
.bank-cell { display:flex; align-items:center; gap:12px; min-width:250px; }
.bank-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:white; flex-shrink:0; }
.bank-info { display:flex; flex-direction:column; gap:3px; }
.bank-name { font-weight:700; font-size:14px; }
.bank-eng { font-size:11px; color:var(--text-muted); font-weight:600; }
.bank-type { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:600; display:inline-block; }
.bank-type.traditional { background:rgba(67,56,202,0.06); color:var(--accent-light); }
.bank-type.virtual { background:rgba(14,165,233,0.08); color:#0284c7; }
.rate-cell { font-weight:700; font-size:16px; font-variant-numeric:tabular-nums; }
.rate-cell.best { color:var(--green); position:relative; }
.rate-cell.best::after { content:'👑'; font-size:10px; margin-left:4px; vertical-align:super; }
.rate-cell.good { color:var(--accent-light); }
.rate-cell.low { color:var(--text-muted); }
.period-cell { font-size:13px; color:var(--text-secondary); font-weight:500; }
.min-deposit { font-size:13px; color:var(--text-secondary); }
.min-deposit .no-min { color:var(--green); font-weight:500; }
.note-cell { font-size:12px; color:var(--text-muted); max-width:220px; white-space:normal; line-height:1.5; }
.loading { text-align:center; padding:40px; color:var(--text-muted); font-size:14px; }

.calc-section { margin-top:32px; display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.calc-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); }
.calc-title { font-size:16px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.calc-form { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1 / -1; }
.form-group label { font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; }
.form-group select, .form-group input { padding:10px 14px; background:#fff; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; }
.form-group select:focus, .form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(67,56,202,0.08); }
.calc-btn { padding:12px; background:linear-gradient(135deg,var(--accent),var(--purple)); border:none; border-radius:8px; color:white; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.calc-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(67,56,202,0.25); }
.calc-result { margin-top:20px; padding:20px; background:rgba(5,150,105,0.04); border:1px solid rgba(5,150,105,0.15); border-radius:8px; display:none; }
.calc-result.show { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.result-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
.result-row+.result-row { border-top:1px solid rgba(5,150,105,0.08); }
.result-label { font-size:13px; color:var(--text-secondary); }
.result-value { font-size:15px; font-weight:700; }
.result-value.highlight { color:var(--green); font-size:22px; }
.chart-wrapper { width:100%; height:260px; position:relative; overflow:hidden; border-radius:8px; background:#f1f5f9; }
.footer { max-width:1400px; margin:40px auto 0; padding:24px; border-top:1px solid var(--border); text-align:center; font-size:12px; color:var(--text-muted); }

.best-banner { background:linear-gradient(135deg,rgba(5,150,105,0.04),rgba(67,56,202,0.04)); border:1px solid rgba(5,150,105,0.12); border-radius:var(--radius); padding:20px 24px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.best-banner-left h3 { font-size:16px; font-weight:700; color:var(--green); margin-bottom:4px; }
.best-banner-left p { font-size:13px; color:var(--text-secondary); }
.best-banner-right { display:flex; gap:24px; align-items:center; }
.best-rate-item { text-align:center; }
.best-rate-item .period { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
.best-rate-item .rate { font-size:22px; font-weight:800; color:var(--green); }
.best-rate-item .bank { font-size:11px; color:var(--text-secondary); }

@media(max-width:768px){
  .header-inner { padding:12px 16px; flex-direction:column; align-items:flex-start; gap:8px; }
  .main { padding:16px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .stat-card { padding:14px; }
  .stat-value { font-size:22px; }
  .filter-row { gap:8px; flex-direction:column; align-items:flex-start; }
  .filter-row>div { width:100%; }
  .filter-btn { padding:6px 12px; font-size:12px; }
  .search-box { max-width:none; min-width:auto; width:100%; }
  .calc-section { grid-template-columns:1fr; }
  .calc-form { grid-template-columns:1fr; }
  .logo-text h1 { font-size:15px; }
  .note-cell { max-width:150px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">💰</div>
      <div class="logo-text">
        <h1>HK Deposit Rates</h1>
        <span>香港定期存款利率比較平台</span>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="statusText">連線中...</span>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label" id="lblBestRate">最高利率</div>
      <div class="stat-value" id="statBestRate">—</div>
      <div class="stat-sub" id="statBestBank">讀取中...</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">比較銀行數目</div>
      <div class="stat-value" id="statBankCount">—</div>
      <div class="stat-sub">傳統 + 數字銀行</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均最高利率</div>
      <div class="stat-value" id="statAvgRate">—</div>
      <div class="stat-sub">所有銀行平均</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">數據更新</div>
      <div class="stat-value" id="statUpdateStatus">—</div>
      <div class="stat-sub" id="statUpdateSub">實時同步中...</div>
    </div>
  </div>

  <div class="best-banner" id="bestBanner">
    <div class="best-banner-left">
      <h3>🏆 今日最高息推介</h3>
      <p id="bannerSubtext">讀取中...</p>
    </div>
    <div class="best-banner-right" id="bannerRates"></div>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">貨幣</span>
      <div class="filter-group" id="currencyFilter">
        <button class="filter-btn active green" data-value="HKD">🇭🇰 港元 HKD</button>
        <button class="filter-btn" data-value="USD">🇺🇸 美元 USD</button>
        <button class="filter-btn" data-value="RMB">🇨🇳 人民幣 RMB</button>
      </div>
    </div>
    <div class="filter-row" style="justify-content:space-between;">
      <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
        <span class="filter-label">銀行類型</span>
        <div class="filter-group" id="typeFilter">
          <button class="filter-btn active" data-value="all">全部</button>
          <button class="filter-btn" data-value="traditional">🏦 傳統銀行</button>
          <button class="filter-btn" data-value="virtual">📱 數字銀行</button>
        </div>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋銀行名稱...">
        </div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-header-bar">
      <div class="table-title">利率比較表 <span class="bank-count" id="bankCountBadge">讀取中...</span></div>
      <div class="sort-hint">點擊欄位標題排序</div>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="tableHead"><tr><th colspan="5" class="loading">⏳ 連線 Apps Script...</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="calc-section">
    <div class="calc-card">
      <div class="calc-title">🧮 利息計算機</div>
      <div class="calc-form">
        <div class="form-group">
          <label>存款貨幣</label>
          <select id="calcCurrency"><option value="HKD">港元 HKD</option><option value="USD">美元 USD</option><option value="RMB">人民幣 RMB</option></select>
        </div>
        <div class="form-group">
          <label>存款期</label>
          <select id="calcPeriod"><option value="1">1 個月</option><option value="3" selected>3 個月</option><option value="6">6 個月</option><option value="12">12 個月</option></select>
        </div>
        <div class="form-group">
          <label>存款金額</label>
          <input type="number" id="calcAmount" value="100000" min="1" placeholder="輸入金額">
        </div>
        <div class="form-group">
          <label>年利率 (%)</label>
          <input type="number" id="calcRate" value="2.65" step="0.01" min="0" placeholder="輸入利率">
        </div>
        <div class="form-group full">
          <button class="calc-btn" id="calcBtn">計算利息收益</button>
        </div>
      </div>
      <div class="calc-result" id="calcResult">
        <div class="result-row"><span class="result-label">存款金額</span><span class="result-value" id="resPrincipal"></span></div>
        <div class="result-row"><span class="result-label">存款期</span><span class="result-value" id="resPeriod"></span></div>
        <div class="result-row"><span class="result-label">年利率</span><span class="result-value" id="resRate"></span></div>
        <div class="result-row"><span class="result-label">到期利息</span><span class="result-value highlight" id="resInterest"></span></div>
        <div class="result-row"><span class="result-label">到期本息合計</span><span class="result-value" id="resTotal"></span></div>
      </div>
    </div>
    <div class="calc-card">
      <div class="calc-title">📊 銀行最高利率比較</div>
      <div class="chart-wrapper"><canvas id="rateChart"></canvas></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p>⚠️ 利率資料僅供參考，實際利率以各銀行官方公布為準。</p>
  <p>數據更新：<span id="footerTime"></span></p>
  <p style="margin-top:8px;">© 2026 HK Deposit Rates</p>
</footer>

<script>
// =============================================
// 設定：你條 Apps Script URL（重新 Deploy 後更新呢度）
// =============================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwDHuNSbRRTv8Y3SyIMQg4hMJXxxF29gT7zt_U9F23QIR0zqtNuI1_9qjxzAAfxACWMA/exec';
// =============================================

const BANK_COLORS = {
  '滙豐銀行':'#db1f26','恒生銀行':'#006341','中銀香港':'#c4161c','渣打銀行':'#007c59','工銀亞洲':'#c5001e','東亞銀行':'#003399',
  '星展銀行':'#e31837','中信銀行(國際)':'#e60012','富邦銀行':'#003063','南洋商業銀行':'#c8102e','招商永隆銀行':'#8b0000','上海商業銀行':'#00468b',
  '大眾銀行':'#003b6f','交通銀行':'#003da5','建設銀行亞洲':'#003da5','花旗銀行':'#003b70','大新銀行':'#da291c','創興銀行':'#0033a0','OCBC':'#e2231a',
  '富融銀行':'#7c3aed','匯立銀行':'#0891b2','象象銀行':'#0ea5e9','眾安銀行':'#6366f1','Mox銀行':'#ec4899','理慧銀行':'#f97316'
};
const BANK_INITIALS = {
  '滙豐銀行':'HS','恒生銀行':'HA','中銀香港':'BO','渣打銀行':'SC','工銀亞洲':'IC','東亞銀行':'BE','星展銀行':'DB','中信銀行(國際)':'CI','富邦銀行':'FB',
  '南洋商業銀行':'NC','招商永隆銀行':'CM','上海商業銀行':'SC','大眾銀行':'PB','交通銀行':'BC','建設銀行亞洲':'CC','花旗銀行':'CT','大新銀行':'DS',
  '創興銀行':'CH','OCBC':'OC','富融銀行':'FU','匯立銀行':'WL','象象銀行':'EL','眾安銀行':'ZA','Mox銀行':'MX','理慧銀行':'LV'
};
const BANK_ENGLISH_NAMES = {
  '滙豐銀行':'HSBC','恒生銀行':'Hang Seng Bank','中銀香港':'BOCHK','渣打銀行':'Standard Chartered','工銀亞洲':'ICBC Asia','東亞銀行':'BEA',
  '星展銀行':'DBS Bank','中信銀行(國際)':'CNCBI','富邦銀行':'Fubon Bank','南洋商業銀行':'NCB','招商永隆銀行':'CMB Wing Lung','上海商業銀行':'Shanghai Commercial Bank',
  '大眾銀行':'Public Bank','交通銀行':'BOCOM','建設銀行亞洲':'CCB Asia','花旗銀行':'Citibank','大新銀行':'Dah Sing Bank','創興銀行':'Chong Hing Bank',
  'OCBC':'OCBC Bank','富融銀行':'Fusion Bank','匯立銀行':'WeLab Bank','象象銀行':'EleBank','眾安銀行':'ZA Bank','Mox銀行':'Mox Bank','理慧銀行':'Livi Bank'
};

let allData = {};
let state = { currency:'HKD', bankType:'all', search:'', sortCol:'rate', sortDir:-1 };

// ===== JSONP 載入（完全冇 CORS 問題） =====
function loadRates() {
  return new Promise((resolve) => {
    const callbackName = 'rates_cb_' + Date.now();
    const script = document.createElement('script');
    let done = false;
    
    function cleanup() {
      if (script.parentNode) script.parentNode.removeChild(script);
      delete window[callbackName];
    }
    
    // 10 秒超時
    const timeout = setTimeout(() => {
      if (!done) {
        done = true;
        cleanup();
        showError('連線超時');
        resolve(false);
      }
    }, 10000);
    
    window[callbackName] = function(data) {
      if (done) return;
      done = true;
      clearTimeout(timeout);
      cleanup();
      
      if (data && data.rates) {
        allData = data.rates;
        const updated = data.updated_at ? new Date(data.updated_at).toLocaleDateString('zh-HK') : '剛剛';
        document.getElementById('statusText').textContent = '✅ 已連線';
        document.getElementById('statUpdateSub').textContent = 'Apps Script 實時同步';
        document.getElementById('footerTime').textContent = updated;
        resolve(true);
      } else {
        showError('數據格式錯誤');
        resolve(false);
      }
    };
    
    script.onerror = function() {
      if (done) return;
      done = true;
      clearTimeout(timeout);
      cleanup();
      showError('Apps Script 連線失敗');
      resolve(false);
    };
    
    script.src = APPS_SCRIPT_URL + '?callback=' + callbackName + '&t=' + Date.now();
    document.head.appendChild(script);
  });
}

function showError(msg) {
  document.getElementById('statusText').textContent = '❌ ' + msg;
  document.getElementById('statUpdateSub').textContent = '請檢查 Apps Script URL';
  document.getElementById('tableHead').innerHTML = '<tr><th colspan="5" style="text-align:center;color:#ef4444;padding:40px;">⚠️ ' + msg + ' — 請重新 Deploy Apps Script</th></tr>';
}

function getFiltered() { return (allData[state.currency]||[]).filter(b=>{ if(state.bankType!=='all'&&b.type!==state.bankType)return false; if(state.search&&!b.bank.toLowerCase().includes(state.search.toLowerCase()))return false; return true; }); }
function getBest(data){ let max=-1,bank=''; data.forEach(b=>{if(b.bestRate>max){max=b.bestRate;bank=b.bank;}}); return {rate:max,bank}; }

function render(){
  const data=getFiltered(); const c=state.currency; const cur={HKD:'港元',USD:'美元',RMB:'人民幣'}[c]||'港元'; const best=getBest(allData[c]||[]);
  document.getElementById('lblBestRate').textContent='最高'+cur+'定存年利率';
  document.getElementById('statBestRate').innerHTML=best.rate>0?best.rate.toFixed(2)+'<span class="unit">%</span>':'—';
  document.getElementById('statBestBank').textContent=best.rate>0?best.bank:'N/A';
  document.getElementById('statBankCount').innerHTML=(allData[c]?allData[c].length:0)+'<span class="unit">間</span>';
  let t=0,n=0; (allData[c]||[]).forEach(b=>{t+=b.bestRate;n++;});
  document.getElementById('statAvgRate').innerHTML=n>0?(t/n).toFixed(2)+'<span class="unit">%</span>':'—';

  const bRates=document.getElementById('bannerRates'); bRates.innerHTML='';
  [...(allData[c]||[])].sort((a,b)=>b.bestRate-a.bestRate).slice(0,3).forEach(b=>{
    const d=document.createElement('div'); d.className='best-rate-item';
    d.innerHTML=`<div class="period">${b.bestPeriod}</div><div class="rate">${b.bestRate.toFixed(2)}%</div><div class="bank">${b.bank}</div>`;
    bRates.appendChild(d);
  });
  document.getElementById('bannerSubtext').textContent=cur+'定期存款 — 即時比較各大銀行最高利率';
  document.getElementById('bankCountBadge').textContent=data.length+' 間銀行';
  
  const sorted=[...data].sort((a,b)=>{ if(state.sortCol==='bank') return state.sortDir*a.bank.localeCompare(b.bank,'zh'); return state.sortDir*(a.bestRate-b.bestRate); });
  const isRate=state.sortCol==='rate', isBank=state.sortCol==='bank';
  const th=document.getElementById('tableHead');
  th.innerHTML='<tr><th data-col="bank" class="'+(isBank?'sorted':'')+'">銀行'+(isBank?'<span style="margin-left:4px;font-size:10px">'+(state.sortDir===1?'▲':'▼')+'</span>':'')+'</th><th data-col="rate" class="'+(isRate?'sorted':'')+'">最高年利率'+(isRate?'<span style="margin-left:4px;font-size:10px">'+(state.sortDir===1?'▲':'▼')+'</span>':'')+'</th><th style="cursor:default">適用期數</th><th style="cursor:default">最低存款額</th><th style="cursor:default">備註</th></tr>';
  th.querySelectorAll('th[data-col]').forEach(th=>{ th.addEventListener('click',()=>{ const col=th.dataset.col; if(state.sortCol===col) state.sortDir*=-1; else { state.sortCol=col; state.sortDir=col==='rate'?-1:1; } render(); }); });

  const tb=document.getElementById('tableBody');
  if(!sorted.length){ tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:60px;color:#64748b"><p>搵唔到符合條件嘅銀行</p></td></tr>'; return; }
  let html='';
  sorted.forEach(b=>{
    const isBest=b.bestRate===best.rate, isGood=b.bestRate>=best.rate*0.9;
    let cls='rate-cell'; if(isBest) cls+=' best'; else if(isGood) cls+=' good'; else cls+=' low';
    const color=BANK_COLORS[b.bank]||'#6b7280', initial=BANK_INITIALS[b.bank]||b.bank.substring(0,2), eng=BANK_ENGLISH_NAMES[b.bank]||'';
    const noMin=b.minDeposit && b.minDeposit.includes('沒有');
    html+=`<tr class="${isBest?'best-rate':''}"><td><div class="bank-cell"><div class="bank-icon" style="background:${color}">${initial}</div><div class="bank-info"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="bank-name">${b.bank}</span><span class="bank-type ${b.type}">${b.type==='traditional'?'傳統銀行':'數字銀行'}</span></div><span class="bank-eng">${eng}</span></div></div></td><td class="${cls}">${b.bestRate.toFixed(2)}%</td><td class="period-cell">${b.bestPeriod||'—'}</td><td class="min-deposit">${noMin?'<span class="no-min">✓ '+b.minDeposit+'</span>':b.minDeposit}</td><td class="note-cell">${b.note||'—'}</td></tr>`;
  });
  tb.innerHTML=html;
  drawChart();
}

function setupFilters(){
  document.querySelectorAll('#currencyFilter .filter-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('#currencyFilter .filter-btn').forEach(b=>b.classList.remove('active','green','orange','purple')); btn.classList.add('active'); state.currency=btn.dataset.value; if(state.currency==='HKD')btn.classList.add('green'); else if(state.currency==='USD')btn.classList.add('orange'); else btn.classList.add('purple'); render(); updateCalc(); }); });
  document.querySelectorAll('#typeFilter .filter-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('#typeFilter .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.bankType=btn.dataset.value; render(); }); });
  document.getElementById('searchInput').addEventListener('input',e=>{ state.search=e.target.value.trim(); render(); });
}
function updateCalc(){ const best=getBest(allData[state.currency]||[]); if(best.rate>0) document.getElementById('calcRate').value=best.rate.toFixed(2); }
function setupCalc(){
  document.getElementById('calcBtn').addEventListener('click',()=>{
    const c=document.getElementById('calcCurrency').value, p=parseInt(document.getElementById('calcPeriod').value), a=parseFloat(document.getElementById('calcAmount').value), r=parseFloat(document.getElementById('calcRate').value);
    if(!a||a<=0){ alert('⚠️ 請輸入有效嘅存款金額'); return; }
    if(!r||r<0){ alert('⚠️ 請輸入有效嘅年利率'); return; }
    const i=a*(r/100)*(p/12), t=a+i, s={HKD:'HK$',USD:'US$',RMB:'¥'}[c];
    document.getElementById('resPrincipal').textContent=s+a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('resPeriod').textContent=p+' 個月';
    document.getElementById('resRate').textContent=r.toFixed(2)+'%';
    document.getElementById('resInterest').textContent=s+i.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('resTotal').textContent=s+t.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('calcResult').classList.add('show');
  });
  document.getElementById('calcCurrency').addEventListener('change',e=>{
    state.currency=e.target.value;
    document.querySelectorAll('#currencyFilter .filter-btn').forEach(b=>{ b.classList.remove('active','green','orange','purple'); if(b.dataset.value===state.currency){ b.classList.add('active'); if(state.currency==='HKD')b.classList.add('green'); else if(state.currency==='USD')b.classList.add('orange'); else b.classList.add('purple'); } });
    render(); updateCalc();
  });
}
function drawChart(){
  const c=document.getElementById('rateChart'), ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1, r=c.parentElement.getBoundingClientRect();
  c.width=r.width*dpr; c.height=r.height*dpr; c.style.width=r.width+'px'; c.style.height=r.height+'px'; ctx.scale(dpr,dpr);
  const W=r.width, H=r.height, pad={top:20,right:20,bottom:80,left:50};
  ctx.clearRect(0,0,W,H);
  const d=(allData[state.currency]||[]).sort((a,b)=>b.bestRate-a.bestRate).slice(0,12);
  if(!d.length) return;
  const max=Math.max(...d.map(x=>x.bestRate))*1.1, cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;
  const bw=Math.min((cw/d.length)*0.6,40), gap=(cw-bw*d.length)/(d.length+1);
  ctx.strokeStyle='rgba(15,23,42,0.06)'; ctx.lineWidth=1;
  for(let i=0;i<=5;i++){ const y=pad.top+(ch/5)*i; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='11px sans-serif'; ctx.textAlign='right'; ctx.fillText((max*(1-i/5)).toFixed(1)+'%',pad.left-8,y+4); }
  d.forEach((b,i)=>{
    const x=pad.left+gap+i*(bw+gap), bh=(b.bestRate/max)*ch, y=pad.top+ch-bh;
    const isBest=i===0, col=isBest?'#059669':'#4f46e5';
    const g=ctx.createLinearGradient(x,y,x,pad.top+ch); g.addColorStop(0,col); g.addColorStop(1,col+'40');
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(x,y,bw,bh,4); ctx.fill();
    ctx.fillStyle=isBest?'#059669':'#475569'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText(b.bestRate.toFixed(2)+'%',x+bw/2,y-6);
    ctx.save(); ctx.translate(x+bw/2,pad.top+ch+14); ctx.rotate(-Math.PI/4); ctx.fillStyle='#64748b'; ctx.font='10px sans-serif'; ctx.textAlign='right'; ctx.fillText(b.bank,0,0); ctx.restore();
  });
}

async function init(){
  const ok = await loadRates();
  if (!ok) return;
  setupFilters();
  setupCalc();
  render();
  updateCalc();
  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(drawChart,200);});
}

document.addEventListener('DOMContentLoaded', init);
</script>
