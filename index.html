<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港定期存款利率比較</title>
<style>
:root{--bg:#f3f4f6;--bg-card:#fff;--border:#e2e8f0;--text:#0f172a;--text-secondary:#475569;--text-muted:#64748b;--accent:#4338ca;--green:#059669;--orange:#d97706;--purple:#7c3aed;--radius:12px;--shadow:0 4px 18px rgba(15,23,42,0.03)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans HK',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:rgba(255,255,255,0.85);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-inner{max-width:1400px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text h1{font-size:18px;font-weight:700}
.logo-text span{font-size:11px;color:var(--text-muted)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(5,150,105,0.08);border:1px solid rgba(5,150,105,0.2);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;color:var(--green)}
.main{max-width:1400px;margin:0 auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--accent))}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,var(--accent),var(--purple))}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,var(--orange),#b45309)}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,var(--purple),var(--accent))}
.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-value .unit{font-size:16px;font-weight:500;color:var(--text-secondary)}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.filter-section{margin-bottom:24px}
.filter-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px}
.filter-label{font-size:13px;font-weight:600;color:var(--text-secondary);min-width:60px}
.filter-group{display:flex;gap:4px;background:#f1f5f9;border-radius:8px;padding:3px;border:1px solid var(--border)}
.filter-btn{padding:8px 16px;border:none;border-radius:6px;background:transparent;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.filter-btn:hover{color:var(--text);background:rgba(15,23,42,0.05)}
.filter-btn.active{background:var(--accent);color:white;box-shadow:0 2px 8px rgba(67,56,202,0.2)}
.filter-btn.active.green{background:var(--green);box-shadow:0 2px 8px rgba(5,150,105,0.25)}
.filter-btn.active.orange{background:var(--orange);color:white;box-shadow:0 2px 8px rgba(217,119,6,0.25)}
.filter-btn.active.purple{background:var(--purple);box-shadow:0 2px 8px rgba(124,58,237,0.25)}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 14px;flex:1;min-width:200px;max-width:320px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%}
.table-wrapper{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.table-header-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-title{font-size:15px;font-weight:700}
.bank-count{background:rgba(67,56,202,0.08);color:var(--accent);font-size:12px;font-weight:600;padding:2px 10px;border-radius:12px}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{padding:14px 16px;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;cursor:pointer;white-space:nowrap}
thead th:hover{background:#f1f5f9}
tbody tr{border-bottom:1px solid var(--border);transition:all 0.2s}
tbody tr:hover{background:var(--bg)}
tbody tr.best-rate{background:rgba(5,150,105,0.03)}
tbody td{padding:14px 16px;font-size:14px;white-space:nowrap;vertical-align:middle}
.bank-cell{display:flex;align-items:center;gap:12px;min-width:250px}
.bank-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0}
.bank-name{font-weight:700;font-size:14px;color:var(--text);text-decoration:none}
.bank-name:hover{color:var(--accent);text-decoration:underline}
.bank-eng{font-size:11px;color:var(--text-muted);font-weight:600}
.bank-type{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;display:inline-block}
.bank-type.traditional{background:rgba(67,56,202,0.06);color:var(--accent)}
.bank-type.virtual{background:rgba(14,165,233,0.08);color:#0284c7}
.rate-cell{font-weight:700;font-size:16px;font-variant-numeric:tabular-nums}
.rate-cell.best{color:var(--green);position:relative}
.rate-cell.best::after{content:'👑';font-size:10px;margin-left:4px;vertical-align:super}
.period-cell{font-size:13px;color:var(--text-secondary);font-weight:500}
.min-deposit{font-size:13px;color:var(--text-secondary)}
.note-cell{font-size:12px;color:var(--text-muted);max-width:220px;white-space:normal;line-height:1.5}
.loading,.error-msg{text-align:center;padding:40px;font-size:14px}
.error-msg{color:#ef4444}
.best-banner{background:linear-gradient(135deg,rgba(5,150,105,0.04),rgba(67,56,202,0.04));border:1px solid rgba(5,150,105,0.12);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.best-banner-left h3{font-size:16px;font-weight:700;color:var(--green);margin-bottom:4px}
.best-banner-left p{font-size:13px;color:var(--text-secondary)}
.best-banner-right{display:flex;gap:24px;align-items:center}
.best-rate-item{text-align:center}
.best-rate-item .period{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.best-rate-item .rate{font-size:22px;font-weight:800;color:var(--green)}
.best-rate-item .bank{font-size:11px;color:var(--text-secondary)}
.footer{max-width:1400px;margin:40px auto 0;padding:24px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--text-muted)}
@media(max-width:768px){.header-inner{padding:12px 16px;flex-direction:column;align-items:flex-start;gap:8px}.main{padding:16px}.stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}.stat-card{padding:14px}.stat-value{font-size:22px}.filter-row{gap:8px;flex-direction:column;align-items:flex-start}.filter-row>div{width:100%}.filter-btn{padding:6px 12px;font-size:12px}.search-box{max-width:none;min-width:auto;width:100%}.note-cell{max-width:150px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">💰</div>
      <div class="logo-text">
        <h1>HK Deposit Rates</h1>
        <span>香港定期存款利率比較平台</span>
      </div>
    </div>
    <div class="live-badge">
      <span style="width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block"></span>
      <span id="statusText">讀取中...</span>
    </div>
  </div>
</header>
<main class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label" id="lblBestRate">最高利率</div>
      <div class="stat-value" id="statBestRate">—</div>
      <div class="stat-sub" id="statBestBank">讀取中...</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">比較銀行數目</div>
      <div class="stat-value" id="statBankCount">—</div>
      <div class="stat-sub">傳統 + 數字銀行</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均最高利率</div>
      <div class="stat-value" id="statAvgRate">—</div>
      <div class="stat-sub">所有銀行平均</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">數據更新</div>
      <div class="stat-value" id="statUpdateStatus">—</div>
      <div class="stat-sub" id="statUpdateSub">讀取中...</div>
    </div>
  </div>
  <div class="best-banner" id="bestBanner">
    <div class="best-banner-left">
      <h3>🏆 今日最高息推介</h3>
      <p id="bannerSubtext">讀取中...</p>
    </div>
    <div class="best-banner-right" id="bannerRates"></div>
  </div>
  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">貨幣</span>
      <div class="filter-group" id="currencyFilter">
        <button class="filter-btn active green" data-value="HKD">🇭🇰 港元 HKD</button>
        <button class="filter-btn" data-value="USD">🇺🇸 美元 USD</button>
        <button class="filter-btn" data-value="RMB">🇨🇳 人民幣 RMB</button>
      </div>
    </div>
    <div class="filter-row" style="justify-content:space-between;">
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
        <span class="filter-label">銀行類型</span>
        <div class="filter-group" id="typeFilter">
          <button class="filter-btn active" data-value="all">全部</button>
          <button class="filter-btn" data-value="traditional">🏦 傳統銀行</button>
          <button class="filter-btn" data-value="virtual">📱 數字銀行</button>
        </div>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋銀行名稱...">
        </div>
      </div>
    </div>
  </div>
  <div class="table-wrapper">
    <div class="table-header-bar">
      <div class="table-title">利率比較表 <span class="bank-count" id="bankCountBadge">讀取中...</span></div>
      <div style="font-size:12px;color:var(--text-muted);">點擊欄位標題排序</div>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="tableHead"><tr><th colspan="5" class="loading">⏳ 讀取數據...</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</main>
<footer class="footer">
  <p>⚠️ 利率資料僅供參考，實際利率以各銀行官方公布為準。</p>
  <p>數據更新：<span id="footerTime"></span></p>
  <p style="margin-top:8px;">© 2026 HK Deposit Rates</p>
</footer>
<script>
const BANK_COLORS={'滙豐銀行':'#db1f26','恒生銀行':'#006341','中銀香港':'#c4161c','渣打銀行':'#007c59','工銀亞洲':'#c5001e','東亞銀行':'#003399','星展銀行':'#e31837','中信銀行(國際)':'#e60012','富邦銀行':'#003063','南洋商業銀行':'#c8102e','招商永隆銀行':'#8b0000','上海商業銀行':'#00468b','大眾銀行':'#003b6f','交通銀行':'#003da5','建設銀行亞洲':'#003da5','花旗銀行':'#003b70','大新銀行':'#da291c','創興銀行':'#0033a0','OCBC':'#e2231a','富融銀行':'#7c3aed','匯立銀行':'#0891b2','象象銀行':'#0ea5e9','眾安銀行':'#6366f1','Mox銀行':'#ec4899','理慧銀行':'#f97316'};
const BANK_INITIALS={'滙豐銀行':'HS','恒生銀行':'HA','中銀香港':'BO','渣打銀行':'SC','工銀亞洲':'IC','東亞銀行':'BE','星展銀行':'DB','中信銀行(國際)':'CI','富邦銀行':'FB','南洋商業銀行':'NC','招商永隆銀行':'CM','上海商業銀行':'SC','大眾銀行':'PB','交通銀行':'BC','建設銀行亞洲':'CC','花旗銀行':'CT','大新銀行':'DS','創興銀行':'CH','OCBC':'OC','富融銀行':'FU','匯立銀行':'WL','象象銀行':'EL','眾安銀行':'ZA','Mox銀行':'MX','理慧銀行':'LV'};
const BANK_ENGLISH_NAMES={'滙豐銀行':'HSBC','恒生銀行':'Hang Seng Bank','中銀香港':'BOCHK','渣打銀行':'Standard Chartered','工銀亞洲':'ICBC Asia','東亞銀行':'BEA','星展銀行':'DBS Bank','中信銀行(國際)':'CNCBI','富邦銀行':'Fubon Bank','南洋商業銀行':'NCB','招商永隆銀行':'CMB Wing Lung','上海商業銀行':'Shanghai Commercial Bank','大眾銀行':'Public Bank','交通銀行':'BOCOM','建設銀行亞洲':'CCB Asia','花旗銀行':'Citibank','大新銀行':'Dah Sing Bank','創興銀行':'Chong Hing Bank','OCBC':'OCBC Bank','富融銀行':'Fusion Bank','匯立銀行':'WeLab Bank','象象銀行':'EleBank','眾安銀行':'ZA Bank','Mox銀行':'Mox Bank','理慧銀行':'Livi Bank'};
let allData={},state={currency:'HKD',bankType:'all',search:'',sortCol:'rate',sortDir:-1};
async function loadData(){
  try{
    const res=await fetch('data.json?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.rates){
      allData=json.rates;
      document.getElementById('statusText').textContent='✅ 已連線';
      document.getElementById('statUpdateSub').textContent='GitHub Actions 自動同步';
      document.getElementById('footerTime').textContent=json.updated_at||'未知';
      return true;
    }
    throw new Error('No data');
  }catch(e){
    document.getElementById('statusText').textContent='⚠️ 離線';
    document.getElementById('statUpdateSub').textContent='讀取 data.json 失敗';
    document.getElementById('tableHead').innerHTML='<tr><th colspan="5" class="error-msg">⚠️ 讀取 data.json 失敗</th></tr>';
    return false;
  }
}
function getFiltered(){return(allData[state.currency]||[]).filter(b=>{if(state.bankType!=='all'&&b.type!==state.bankType)return false;if(state.search&&!b.bank.toLowerCase().includes(state.search.toLowerCase()))return false;return true;})}
function getBest(data){let max=-1,bank='';data.forEach(b=>{if(b.bestRate>max){max=b.bestRate;bank=b.bank}});return{rate:max,bank}}
function render(){
  const data=getFiltered();const c=state.currency;const cur={HKD:'港元',USD:'美元',RMB:'人民幣'}[c]||'港元';const best=getBest(allData[c]||[]);
  document.getElementById('lblBestRate').textContent='最高'+cur+'定存年利率';
  document.getElementById('statBestRate').innerHTML=best.rate>0?best.rate.toFixed(2)+'<span class="unit">%</span>':'—';
  document.getElementById('statBestBank').textContent=best.rate>0?best.bank:'N/A';
  document.getElementById('statBankCount').innerHTML=(allData[c]?allData[c].length:0)+'<span class="unit">間</span>';
  let t=0,n=0;(allData[c]||[]).forEach(b=>{t+=b.bestRate;n++});
  document.getElementById('statAvgRate').innerHTML=n>0?(t/n).toFixed(2)+'<span class="unit">%</span>':'—';
  document.getElementById('statUpdateStatus').textContent=document.getElementById('footerTime').textContent||'—';
  const bRates=document.getElementById('bannerRates');bRates.innerHTML='';
  [...(allData[c]||[])].sort((a,b)=>b.bestRate-a.bestRate).slice(0,3).forEach(b=>{
    const d=document.createElement('div');d.className='best-rate-item';
    d.innerHTML='<div class="period">'+b.bestPeriod+'</div><div class="rate">'+b.bestRate.toFixed(2)+'%</div><div class="bank">'+b.bank+'</div>';
    bRates.appendChild(d);
  });
  document.getElementById('bannerSubtext').textContent=cur+'定期存款 — 即時比較各大銀行最高利率';
  document.getElementById('bankCountBadge').textContent=data.length+' 間銀行';
  const sorted=[...data].sort((a,b)=>{if(state.sortCol==='bank')return state.sortDir*a.bank.localeCompare(b.bank,'zh');return state.sortDir*(a.bestRate-b.bestRate);});
  const isRate=state.sortCol==='rate',isBank=state.sortCol==='bank';
  const th=document.getElementById('tableHead');
  th.innerHTML='<tr><th data-col="bank" class="'+(isBank?'sorted':'')+'">銀行'+(isBank?'<span style="margin-left:4px;font-size:10px">'+(state.sortDir===1?'▲':'▼')+'</span>':'')+'</th><th data-col="rate" class="'+(isRate?'sorted':'')+'">最高年利率'+(isRate?'<span style="margin-left:4px;font-size:10px">'+(state.sortDir===1?'▲':'▼')+'</span>':'')+'</th><th style="cursor:default">適用期數</th><th style="cursor:default">最低存款額</th><th style="cursor:default">備註</th></tr>';
  th.querySelectorAll('th[data-col]').forEach(th=>{th.addEventListener('click',()=>{const col=th.dataset.col;if(state.sortCol===col)state.sortDir*=-1;else{state.sortCol=col;state.sortDir=col==='rate'?-1:1}render()})});
  const tb=document.getElementById('tableBody');
  if(!sorted.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:60px;color:#64748b"><p>搵唔到符合條件嘅銀行</p></td></tr>';return}
  let html='';
  sorted.forEach(b=>{
    const isBest=b.bestRate===best.rate,isGood=b.bestRate>=best.rate*0.9;
    let cls='rate-cell';if(isBest)cls+=' best';else if(isGood)cls+=' good';else cls+=' low';
    const color=BANK_COLORS[b.bank]||'#6b7280',initial=BANK_INITIALS[b.bank]||b.bank.substring(0,2),eng=BANK_ENGLISH_NAMES[b.bank]||'';
    const noMin=b.minDeposit&&b.minDeposit.includes('沒有');
    const bankNameHtml=b.url
      ?'<a href="'+b.url+'" target="_blank" rel="noopener noreferrer" class="bank-name">'+b.bank+'</a>'
      :'<span class="bank-name">'+b.bank+'</span>';
    html+='<tr class="'+(isBest?'best-rate':'')+'"><td><div class="bank-cell"><div class="bank-icon" style="background:'+color+'">'+initial+'</div><div style="display:flex;flex-direction:column;gap:3px"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+bankNameHtml+'<span class="bank-type '+b.type+'">'+(b.type==='traditional'?'傳統銀行':'數字銀行')+'</span></div><span class="bank-eng">'+eng+'</span></div></div></td><td class="'+cls+'">'+b.bestRate.toFixed(2)+'%</td><td class="period-cell">'+(b.bestPeriod||'—')+'</td><td class="min-deposit">'+(noMin?'<span style="color:#059669;font-weight:600">✓ '+b.minDeposit+'</span>':b.minDeposit)+'</td><td class="note-cell">'+(b.note||'—')+'</td></tr>';
  });
  tb.innerHTML=html;
}
function setupFilters(){
  document.querySelectorAll('#currencyFilter .filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#currencyFilter .filter-btn').forEach(b=>b.classList.remove('active','green','orange','purple'));btn.classList.add('active');state.currency=btn.dataset.value;if(state.currency==='HKD')btn.classList.add('green');else if(state.currency==='USD')btn.classList.add('orange');else btn.classList.add('purple');render();})});
  document.querySelectorAll('#typeFilter .filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#typeFilter .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.bankType=btn.dataset.value;render();})});
  document.getElementById('searchInput').addEventListener('input',e=>{state.search=e.target.value.trim();render()});
}
async function init(){
  const ok=await loadData();
  if(!ok)return;
  setupFilters();
  render();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
