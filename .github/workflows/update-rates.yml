name: Auto Update Bank Rates

on:
  schedule:
    # 香港時間每日朝早 9 點跑（UTC 1:00）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 容許手動觸發

# 限制整個工作流的預設權限，只在需要時給寫入權限，提升安全性
permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 💡 優化 1：自動快取 pip 依賴，下次跑會快很多

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          
      - name: Cache Playwright Browsers
        # 💡 優化 2：快取 Playwright 的瀏覽器檔案（大約幾百MB），避免每日重複下載，激省時間！
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Dependencies
        # 💡 優化 3：如果快取中了，就只裝系統依賴，不重複下載 chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            playwright install-deps chromium
          else
            playwright install --with-deps chromium
          fi
          
      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if changed
        # 💡 優化 4：這裡才明確聲明寫入權限，確保安全
        permissions:
          contents: write
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 確保 data.json 存在才進行 git add，防止 scraper 失敗時噴錯
          if [ -f data.json ]; then
            git add data.json
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "auto: update rates $(date +'%Y-%m-%d %H:%M')"
              git push
            fi
          else
            echo "Error: data.json not found!"
            exit 1
          fi
